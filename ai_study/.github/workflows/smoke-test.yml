name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cd backend
          docker-compose up -d postgres
          for i in $(seq 1 30); do
            docker exec devpilot-postgres pg_isready -U devpilot -d devpilot && break
            sleep 1
          done

      - name: Build backend
        run: |
          cd backend
          go build ./cmd/api/...

      - name: Run backend
        run: |
          cd backend
          PORT=8080 go run ./cmd/api/main.go &
          BACKEND_PID=$!
          for i in $(seq 1 10); do
            curl -s http://localhost:8080/health && break
            sleep 1
          done
          kill $BACKEND_PID 2>/dev/null

  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Verify no hardcoded wrong ports
        run: |
          grep -rn "localhost:8084\|localhost:8085\|localhost:8086" frontend/src/ && exit 1 || exit 0
          grep -rn "8085\|8084" frontend/src/lib/delivery-api.ts && exit 1 || exit 0

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: |
          cd backend
          docker-compose up -d postgres
          for i in $(seq 1 30); do
            docker exec devpilot-postgres pg_isready -U devpilot -d devpilot && break
            sleep 1
          done

      - name: Start backend
        run: |
          cd backend
          PORT=8080 go run ./cmd/api/main.go &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/health && break
            sleep 1
          done
          curl -sf http://localhost:8080/health

      - name: Start frontend
        run: |
          cd frontend
          npm ci
          PORT=3000 npm run dev &
          echo $! > /tmp/frontend.pid
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 -o /dev/null && break
            sleep 2
          done
          curl -sf http://localhost:3000 -o /dev/null

      - name: Integration: Submit requirement via frontend proxy
        run: |
          # 通过 Next.js 代理转发到后端，验证整条链路通畅
          curl -sf -X POST http://localhost:3000/api/requirements/submit \
            -H "Content-Type: application/json" \
            -d '{"prompt":"测试需求：创建一个登录页面，包含用户名密码输入","user_id":"test-user"}'

      - name: Integration: Fetch task list via frontend proxy
        run: |
          curl -sf http://localhost:3000/api/tasks \
            -H "Content-Type: application/json"

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/backend.pid) 2>/dev/null
          kill $(cat /tmp/frontend.pid) 2>/dev/null
