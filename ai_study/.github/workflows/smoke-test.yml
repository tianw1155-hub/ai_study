name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          cd backend
          docker-compose up -d postgres
          for i in $(seq 1 30); do
            docker exec devpilot-postgres pg_isready -U devpilot -d devpilot && break
            sleep 1
          done

      - name: Build backend
        run: |
          cd backend
          go build ./cmd/api/...

      - name: Run backend
        run: |
          cd backend
          PORT=8080 go run ./cmd/api/main.go &
          BACKEND_PID=$!
          for i in $(seq 1 10); do
            curl -s http://localhost:8080/health && break
            sleep 1
          done
          kill $BACKEND_PID 2>/dev/null

  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Verify no hardcoded wrong ports
        run: |
          grep -rn "localhost:8084\|localhost:8085\|localhost:8086" frontend/src/ && exit 1 || exit 0
          grep -rn "8085\|8084" frontend/src/lib/delivery-api.ts && exit 1 || exit 0
